  <!-- Modal para crear publicación -->
<div id="createModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Crear Nueva Publicación</h2>
      <span class="close">&times;</span>
    </div>
    <form id="create-post-form" enctype="multipart/form-data">
      <div class="form-group">
        <label for="post-title">Título de la publicación</label>
        <input type="text" id="post-title" name="title" required>
      </div>
      
      <div class="form-group">
        <label for="post-content">Contenido</label>
        <textarea id="post-content" name="content" rows="4" required></textarea>
      </div>
      
      <div class="form-group">
        <label for="post-category">Categoría</label>
        <select id="post-category" name="category" required>
          <option value="">Selecciona una categoría</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="post-worldcup">Mundial relacionado</label>
        <select id="post-worldcup" name="worldcup" required>
          <option value="">Selecciona un mundial</option>
          <option value="uruguay-1930">Uruguay 1930</option>
          <option value="argentina-1978">Argentina 1978</option>
          <option value="mexico-1986">México 1986</option>
          <option value="italia-1990">Italia 1990</option>
          <option value="usa-1994">Estados Unidos 1994</option>
          <option value="francia-1998">Francia 1998</option>
          <option value="corea-japon-2002">Corea/Japón 2002</option>
          <option value="alemania-2006">Alemania 2006</option>
          <option value="sudafrica-2010">Sudáfrica 2010</option>
          <option value="brasil-2014">Brasil 2014</option>
          <option value="rusia-2018">Rusia 2018</option>
          <option value="catar-2022">Catar 2022</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="post-country">País</label>
        <input type="text" id="post-country" name="country" placeholder="Ej: Argentina, Brasil, etc.">
      </div>
      
      <div class="form-group">
        <label for="post-media">Imagen</label>
        <input type="file" id="post-media" name="media" accept="image/*,video/*" required>
        <small>Formatos permitidos: JPG, PNG, GIF, MP4, AVI</small>
      </div>
      
      <div class="form-actions">
        <button type="button" class="btn-cancel">Cancelar</button>
        <button type="submit" class="btn-submit">Publicar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal -->
<div id="postModal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div class="modal-img-wrapper">

    </div>
    <div class="modal-text">
      <h3 id="modal-title"></h3>
      <p id="modal-country"></p>
      <p id="modal-year"></p>
      <p id="modal-content"></p>
      <div class="modal-footer">
        <span id="modal-comments">💬 0</span>
        <span id="modal-likes">💛 0</span>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const userName = localStorage.getItem("userName");
    const userElement = document.getElementById("user-name");
    const loginBtn = document.getElementById("loginBtn");

    if (localStorage.getItem("isLoggedIn") === "true" && userName) {
        // Usuario logueado
        userElement.textContent = userName;
        userElement.style.display = "inline";
        
        // AGREGAR ESTO: Hacer el nombre clickeable
        userElement.style.cursor = "pointer";
        userElement.style.textDecoration = "underline";
        userElement.onclick = () => {
            window.location.href = "perfil.html";
        };

        loginBtn.textContent = "Cerrar sesión";
        loginBtn.onclick = () => {
            localStorage.clear();
            window.location.href = "login.html";
        };
    } else {
        userElement.style.display = "none";
        loginBtn.textContent = "Iniciar sesión";
        loginBtn.onclick = () => window.location.href = "login.html";
    }
});
</script>
