<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Usuario</title>

  <link href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="Public/css/perfil.css">

<link rel="stylesheet" href="Public/css/modal2.css">

</head>
<body>
  

  <header>
    <h1>Mi Perfil</h1>
  </header>

  <section class="user-actions">
    <button id="btn-regresar">← Regresar al inicio</button>
    <button id="btn-editar">✎ Editar perfil</button>
  </section>

  <section class="user-info">
    <h2>Datos del usuario</h2>
    <p><strong>Nombre:</strong> <span id="profile-name"></span></p>
    <p><strong>Email:</strong> <span id="profile-email"></span></p>
  </section>

  <section class="user-posts">
    <h2>Mis publicaciones</h2>
    <div id="posts-container">
    </div>
  </section>


  <!-- Modal de edición -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <h2>Editar perfil</h2>
      <form id="edit-profile-form">
        <label>Nombre completo</label>
        <input type="text" id="nombre_completo" required>

        <label>Fecha de nacimiento</label>
        <input type="date" id="fecha_nacimiento" required>

        <label>Género</label>
        <select id="genero">
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
          <option value="otro">Otro</option>
        </select>

        <label>País de nacimiento</label>
        <input type="text" id="pais_nacimiento" required>

        <label>Nacionalidad</label>
        <input type="text" id="nacionalidad" required>

        <button type="submit">Guardar cambios</button>
        <button type="button" id="btn-cancelar">Cancelar</button>
      </form>
    </div>
  </div>

<script src="Public/js/perfil.js"></script>
<script src="Public/js/editar-perfil.js"></script>

<script src="Public/js/auth.js"></script>

<script src="Public/js/middleware.js"></script>

</body>
</html>
